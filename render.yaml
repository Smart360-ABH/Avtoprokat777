services:
  - type: web
    name: avtoprokat777
    env: node
    plan: free
    buildCommand: pnpm run build
    startCommand: pnpm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: avtoprokat777-db
          property: connectionString
      - key: PORT
        value: 10000

databases:
  - name: avtoprokat777-db
    plan: free
    databaseName: autopro777
    user: autopro777_user
