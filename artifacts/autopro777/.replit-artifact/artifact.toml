kind = "web"
previewPath = "/"
title = "Автопрокат 777"
version = "1.0.0"
id = "artifacts/autopro777"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19846

[services.development]
run = "pnpm --filter @workspace/autopro777 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/autopro777", "run", "build" ]
publicDir = "artifacts/autopro777/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19846"
BASE_PATH = "/"
